<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>보고서 수정</title>
</head>
<body>
    <h1>보고서 수정</h1>
    <p>보고서 번호: <span id="reportNo" th:text="${report.reportNo}"></span></p>

    <form id="updateForm">
        제목: <input type="text" id="title" th:value="${report.title}" style="width: 300px;"><br>
        내용: <textarea id="content" rows="10" cols="50" th:text="${report.content}"></textarea><br>
        사용 목적: <input type="text" id="usagePurpose" th:value="${report.usagePurpose}" style="width: 300px;"><br>
        
        <hr>
        <h3>현재 등록된 사진</h3>
        <p>새 사진을 올리지 않으면 이 사진들이 유지됩니다.</p>
        <div th:each="img : ${report.images}" style="display: inline-block; margin-right: 10px; border: 1px solid #ccc; padding: 5px;">
            <img th:src="${img.imgPath}" width="150"><br>
            설명: <span th:text="${img.purpose}"></span>
        </div>

        <hr>
        <h3>사진 교체 (새로 올릴 경우에만 선택)</h3>
        <p style="color: red;">※ 사진을 새로 업로드하면 기존 사진들은 모두 삭제되고 새 사진으로 대체됩니다.</p>
        <div id="imageInputs">
            <div>
                파일: <input type="file" name="files" />
                설명: 
                <select name="purposes">
                    <option value="FIELD_PHOTO">활동사진</option>
                    <option value="RECEIPT">영수증</option>
                </select>
            </div>
        </div>
        <button type="button" onclick="addImageInput()">+ 사진 추가</button>

        <hr>
        <button type="button" onclick="updateReport()" style="padding: 10px 20px;">수정 완료</button>
        <a href="/finalReport/list"><button type="button">취소</button></a>
    </form>

    <script>
        function addImageInput() {
            const div = document.createElement('div');
            div.style.marginTop = "5px";
            div.innerHTML = `
                파일: <input type="file" name="files" /> 
                설명: 
                <select name="purposes">
                    <option value="FIELD_PHOTO">활동사진</option>
                    <option value="RECEIPT">영수증</option>
                </select>
            `;
            document.getElementById('imageInputs').appendChild(div);
        }

        async function updateReport() {
            const reportNo = document.getElementById('reportNo').innerText;
            const formData = new FormData();
            
            // 1. 목적 리스트 준비
            const purposeInputs = document.getElementsByName('purposes');
            const purposesArray = [];
            for (let i = 0; i < purposeInputs.length; i++) {
                purposesArray.push(purposeInputs[i].value || "GENERAL");
            }

            // 2. DTO 구성 (purposes 포함)
            const dto = {
                title: document.getElementById('title').value,
                content: document.getElementById('content').value,
                usagePurpose: document.getElementById('usagePurpose').value,
                purposes: purposesArray
            };
            
            formData.append("dto", new Blob([JSON.stringify(dto)], { type: "application/json" }));

            // 3. 파일 추가 (새로 선택한 경우에만)
            const fileInputs = document.getElementsByName('files');
            for (let i = 0; i < fileInputs.length; i++) {
                if (fileInputs[i].files[0]) {
                    formData.append("files", fileInputs[i].files[0]);
                }
            }

            try {
                const response = await fetch('/finalReport/update/' + reportNo, {
                    method: 'PUT',
                    body: formData
                });

                if (response.ok) {
                    alert("성공적으로 수정되었습니다.");
                    location.href = "/finalReport/list";
                } else {
                    const errorMsg = await response.text();
                    alert("수정 실패: " + errorMsg);
                }
            } catch (error) {
                console.error("수정 중 오류:", error);
                alert("서버 통신 오류");
            }
        }
    </script>
</body>
</html>
