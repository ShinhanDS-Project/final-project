<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>보고서 관리 및 지갑</title>
</head>
<body>
    <div style="text-align: right; margin-bottom: 10px;">
        <a href="/api/beneficiary/info"><button type="button">내 정보 보기</button></a>
        <a href="/api/beneficiary/edit"><button type="button">내 정보 수정</button></a>
        <form th:action="@{/api/beneficiary/logout}" method="post" style="display: inline;">
            <button type="submit">로그아웃</button>
        </form>
    </div>

    <!-- 💡 내 지갑 정보 섹션 -->
    <div th:if="${wallet != null}" style="border: 1px solid #000; padding: 10px; margin-bottom: 20px;">
        <h2>💰 내 지갑 정보</h2>
        <p><strong>지갑 주소:</strong> <span th:text="${wallet.walletAddress}"></span></p>
        <p><strong>현재 잔액:</strong> <span th:text="${wallet.balance}"></span> Token</p>
        
        <hr>
        <h3>💸 현금화 요청</h3>
        금액: <input type="number" id="redemptionAmount" placeholder="요청할 토큰 수량">
        <button type="button" th:onclick="'requestRedemption(' + ${beneficiaryNo} + ')'">현금화 신청하기</button>
    </div>

    <h1>내 보고서 관리</h1>

    <!-- 1. 작성 대기 -->
    <section>
        <h2>📝 작성해야 할 보고서</h2>
        <table border="1">
            <thead>
                <tr><th>캠페인 번호</th><th>캠페인 제목</th><th>작업</th></tr>
            </thead>
            <tbody>
                <tr th:each="campaign : ${campaignList}" 
                    th:if="${#lists.isEmpty(reportList.?[campaignNo == __${campaign.campaignNo}__])}">
                    <td th:text="${campaign.campaignNo}"></td>
                    <td th:text="${campaign.title}"></td>
                    <td>
                        <a th:href="@{/finalReport/submit(campaignNo=${campaign.campaignNo})}">
                            <button type="button">보고서 작성하기</button>
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </section>

    <hr>

    <!-- 2. 검토 대기 (PENDING) -->
    <section>
        <h2>⏳ 검토 대기 중인 보고서</h2>
        <table border="1">
            <thead>
                <tr><th>보고서 번호</th><th>제목</th><th>작성일</th><th>작업</th></tr>
            </thead>
            <tbody>
                <tr th:each="report : ${reportList}" th:if="${report.approvalStatus.name() == 'PENDING'}">
                    <td th:text="${report.reportNo}"></td>
                    <td th:text="${report.title}"></td>
                    <td th:text="${#temporals.format(report.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                    <td>
                        <button type="button" th:onclick="'viewReport(' + ${report.reportNo} + ')'">상세 보기</button>
                        <button type="button" th:onclick="'editReport(' + ${report.reportNo} + ')'">수정하기</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </section>

    <hr>

    <!-- 3. 승인 완료 (APPROVED) -->
    <section>
        <h2>✅ 승인 완료된 보고서</h2>
        <table border="1">
            <thead>
                <tr><th>보고서 번호</th><th>제목</th><th>승인일</th><th>작업</th></tr>
            </thead>
            <tbody>
                <tr th:each="report : ${reportList}" th:if="${report.approvalStatus.name() == 'APPROVED'}">
                    <td th:text="${report.reportNo}"></td>
                    <td th:text="${report.title}"></td>
                    <td th:text="${#temporals.format(report.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                    <td>
                        <button type="button" th:onclick="'viewReport(' + ${report.reportNo} + ')'">상세 보기</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </section>

    <hr>

    <!-- 4. 반려됨 (REJECTED) -->
    <section>
        <h2>❌ 반려된 보고서 (수정 필요)</h2>
        <table border="1">
            <thead>
                <tr><th>보고서 번호</th><th>제목</th><th>반려 사유</th><th>작업</th></tr>
            </thead>
            <tbody>
                <tr th:each="report : ${reportList}" th:if="${report.approvalStatus.name() == 'REJECTED'}">
                    <td th:text="${report.reportNo}"></td>
                    <td th:text="${report.title}"></td>
                    <td style="color: red;" th:text="${report.rejectReason}"></td>
                    <td>
                        <button type="button" th:onclick="'editReport(' + ${report.reportNo} + ')'">수정하기</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </section>

    <script>
        function viewReport(reportNo) {
            location.href = "/finalReport/" + reportNo;
        }
        function editReport(reportNo) {
            location.href = "/finalReport/update?reportNo=" + reportNo;
        }

        // 💡 현금화 요청 함수
        async function requestRedemption(beneficiaryNo) {
            const amount = document.getElementById('redemptionAmount').value;
            if(!amount || amount <= 0) {
                alert("올바른 금액을 입력해주세요.");
                return;
            }

            const dto = {
                requesterType: 'BENEFICIARY',
                requesterNo: beneficiaryNo,
                amount: parseInt(amount)
            };

            try {
                const response = await fetch('/api/redemptions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dto)
                });

                if (response.ok) {
                    alert("현금화 요청이 성공적으로 접수되었습니다.");
                    location.reload(); // 잔액 업데이트를 위해 새로고침
                } else {
                    const errorMsg = await response.text();
                    alert("요청 실패: " + errorMsg);
                }
            } catch (error) {
                console.error("에러:", error);
                alert("서버 통신 오류");
            }
        }
    </script>
</body>
</html>
