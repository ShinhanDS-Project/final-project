<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h2>내 참여 캠페인 목록</h2>
<table border="1">
    <thead>
    <tr>
        <th>캠페인 번호</th>
        <th>캠페인 제목</th>
        <th>상태</th>
        <th>보고서 작성</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="campaign : ${campaignList}">
        <td th:text="${campaign.campaignNo}">번호</td>
        <td th:text="${campaign.title}">제목</td>
        <td th:text="${campaign.campaignStatus}">진행상태</td>
        <td>
            <a th:href="@{/finalReport/submit(campaignNo=${campaign.campaignNo})}">
                <button type="button">보고서 작성하기</button>
            </a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
