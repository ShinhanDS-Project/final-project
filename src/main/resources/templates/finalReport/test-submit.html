<!DOCTYPE html>
<html>
<head><title>Report Submit Test</title></head>
<body>
<h2>보고서 제출 테스트 (JWT)</h2>
캠페인 번호: <input type="number" id="campaign_no" value="9"><br>
제목: <input type="text" id="title"><br>
내용: <textarea id="content"></textarea><br>
사용목적: <input type="text" id="usagePurpose"><br>

<hr>
파일 1: <input type="file" id="file1"><br>
목적 1: <input type="text" id="purpose1" value="FIELD_PHOTO"><br>

파일 2: <input type="file" id="file2"><br>
목적 2: <input type="text" id="purpose2" value="RECEIPT"><br>

<button onclick="submit()">제출하기</button>

<script>
    async function submit() {
        const formData = new FormData();
        const token = localStorage.getItem('accessToken');

        // 1. DTO 부분 (JSON 문자열을 Blob으로 감싸서 application/json 명시)
        const dto = {
            campaign_no: document.getElementById('campaign_no').value,
            title: document.getElementById('title').value,
            content: document.getElementById('content').value,
            usagePurpose: document.getElementById('usagePurpose').value
        };
        formData.append('dto', new Blob([JSON.stringify(dto)], { type: 'application/json' }));

        // 2. 파일 리스트
        formData.append('files', document.getElementById('file1').files[0]);
        formData.append('files', document.getElementById('file2').files[0]);

        // 3. 목적 리스트 (JSON 배열로 전송)
        const purposes = [
            document.getElementById('purpose1').value,
            document.getElementById('purpose2').value
        ];
        formData.append('purposes', new Blob([JSON.stringify(purposes)], { type: 'application/json' }));

        const response = await fetch('/finalReport/submit', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token },
            body: formData
        });

        const result = await response.text();
        alert(result);
    }
</script>
</body>
</html>
