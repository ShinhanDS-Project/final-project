<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>캠페인 등록</title>
    <style>
        :root {
            --bg: #f6f4ef;
            --panel: #fffdf8;
            --line: #ddd6c8;
            --text: #1f2937;
            --muted: #6b7280;
            --accent: #1d4ed8;
            --accent-soft: #dbeafe;
            --success: #166534;
            --success-soft: #dcfce7;
            --danger: #b91c1c;
            --danger-soft: #fee2e2;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Malgun Gothic", sans-serif;
            background: linear-gradient(180deg, #f8f5ee 0%, #f3f6fb 100%);
            color: var(--text);
        }
        .page {
            max-width: 960px;
            margin: 0 auto;
            padding: 40px 20px 80px;
        }
        .header {
            margin-bottom: 24px;
        }
        .header h1 {
            margin: 0 0 8px;
            font-size: 32px;
        }
        .header p {
            margin: 0;
            color: var(--muted);
        }
        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }
        .field.full {
            grid-column: 1 / -1;
        }
        .inline-field {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 10px;
            align-items: center;
        }
        label {
            font-weight: 700;
            font-size: 14px;
        }
        input, textarea, select {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 12px 14px;
            font: inherit;
            background: #fff;
        }
        textarea {
            min-height: 140px;
            resize: vertical;
        }
        .section-title {
            margin: 28px 0 12px;
            font-size: 18px;
        }
        .inline-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .row-card {
            border: 1px dashed var(--line);
            border-radius: 14px;
            padding: 14px;
            background: #fff;
        }
        .row-grid {
            display: grid;
            grid-template-columns: 1fr 180px;
            gap: 12px;
        }
        .detail-image-card {
            display: grid;
            grid-template-columns: 120px minmax(0, 1fr) auto;
            gap: 14px;
            align-items: center;
        }
        .detail-image-card img {
            width: 120px;
            height: 88px;
            border-radius: 10px;
            object-fit: cover;
            border: 1px solid var(--line);
            background: #eef2f7;
        }
        .detail-image-card .image-name {
            min-width: 0;
            color: var(--muted);
            font-size: 13px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .danger {
            background: var(--danger-soft);
            color: var(--danger);
        }
        .removed {
            opacity: 0.45;
        }
        .actions {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }
        button {
            border: 0;
            border-radius: 999px;
            padding: 12px 18px;
            font: inherit;
            cursor: pointer;
        }
        .primary {
            background: var(--accent);
            color: #fff;
        }
        .secondary {
            background: var(--accent-soft);
            color: var(--accent);
        }
        .ghost {
            background: #eef2f7;
            color: var(--text);
        }
        .status {
            margin-top: 16px;
            color: var(--muted);
            font-size: 14px;
        }
        .check-result {
            display: none;
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 14px;
            line-height: 1.7;
        }
        .check-result.success {
            display: block;
            background: var(--success-soft);
            color: var(--success);
        }
        .check-result.error {
            display: block;
            background: var(--danger-soft);
            color: var(--danger);
        }
        .wallet-list {
            display: grid;
            gap: 8px;
            margin-top: 10px;
        }
        .wallet-item {
            padding: 10px 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.75);
        }
        .wallet-item strong {
            display: block;
            margin-bottom: 4px;
        }
        .hint {
            font-size: 12px;
            color: var(--muted);
            margin-top: 4px;
        }
        @media (max-width: 720px) {
            .grid, .row-grid, .inline-field, .detail-image-card {
                grid-template-columns: 1fr;
            }
            .actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<div class="page">
    <div class="header">
        <h1>캠페인 등록</h1>
        <p>수혜자 코드와 재단 지갑 상태를 먼저 확인하고 등록할 수 있습니다.</p>
    </div>

    <div class="panel">
        <form id="campaignForm">
            <div class="grid">
                <div class="field">
                    <label for="title">제목</label>
                    <input id="title" type="text" placeholder="캠페인 제목" required>
                </div>
                <div class="field">
                    <label for="category">카테고리</label>
                    <select id="category" required>
                        <option value="">카테고리 선택</option>
                        <option value="CHILD_YOUTH">아동/청소년</option>
                        <option value="SENIOR">어르신</option>
                        <option value="DISABLED">장애인</option>
                        <option value="ANIMAL">동물</option>
                        <option value="ENVIRONMENT">환경</option>
                        <option value="ETC">기타</option>
                    </select>
                </div>
                <div class="field">
                    <label for="entryCode">Beneficiary Entry Code</label>
                    <div class="inline-field">
                        <input id="entryCode" type="text" placeholder="수혜자 entry code 입력" required>
                        <button class="secondary" type="button" id="checkBeneficiaryButton">확인</button>
                    </div>
                    <div class="hint">entry code 확인 후 beneficiary 이름을 표시합니다.</div>
                    <div id="beneficiaryResult" class="check-result"></div>
                </div>
                <div class="field">
                    <label for="foundationNo">Foundation No</label>
                    <div class="inline-field">
                        <input id="foundationNo" type="number" min="1" placeholder="재단 번호 입력" required>
                        <button class="secondary" type="button" id="checkFoundationButton">확인</button>
                    </div>
                    <div class="hint">재단의 캠페인 지갑 3개 중 사용 가능한 INACTIVE 지갑이 있는지 확인합니다.</div>
                    <div id="foundationResult" class="check-result"></div>
                </div>
                <div class="field full">
                    <label for="description">설명</label>
                    <textarea id="description" placeholder="캠페인 설명" required></textarea>
                </div>
                <div class="field">
                    <label for="targetAmount">목표 금액</label>
                    <input id="targetAmount" type="number" min="0" placeholder="1000000" required>
                </div>
                <div class="field">
                    <label for="imageFile">대표 이미지</label>
                    <input id="imageFile" type="file" accept="image/*" required>
                </div>
                <div class="field">
                    <label for="startAt">모금 시작일</label>
                    <input id="startAt" type="datetime-local" required>
                </div>
                <div class="field">
                    <label for="endAt">모금 종료일</label>
                    <input id="endAt" type="datetime-local" required>
                </div>
                <div class="field">
                    <label for="usageStartAt">사용 시작일</label>
                    <input id="usageStartAt" type="datetime-local" required>
                </div>
                <div class="field">
                    <label for="usageEndAt">사용 종료일</label>
                    <input id="usageEndAt" type="datetime-local" required>
                </div>
            </div>

            <h2 class="section-title">지출 계획</h2>
            <div id="planList" class="inline-list"></div>
            <button type="button" class="secondary" id="addPlanButton">지출 계획 추가</button>

            <h2 class="section-title">상세 이미지</h2>
            <div id="detailImageList" class="inline-list"></div>
            <button type="button" class="secondary" id="addDetailImageButton">상세 이미지 추가</button>

            <div class="actions">
                <button type="button" class="primary" id="submitCampaignButton">등록 요청</button>
                <button type="reset" class="ghost">초기화</button>
            </div>
            <p id="status" class="status"></p>
        </form>
    </div>
</div>

<script th:inline="javascript">
    const editMode = Boolean([[${editMode != null && editMode}]]);
    const editCampaignNo = [[${campaignNo != null ? campaignNo : 'null'}]];
    let beneficiaryChecked = false;
    let foundationChecked = false;
    let foundationHasAvailableWallet = false;
    const deletedDetailImageNos = new Set();

    function addPlanRow(planContent = '', planAmount = '') {
        const wrapper = document.createElement('div');
        wrapper.className = 'row-card';
        wrapper.innerHTML = `
            <div class="row-grid">
                <input type="text" name="planContent" placeholder="지출 계획 내용" required>
                <input type="number" name="planAmount" min="0" placeholder="금액" required>
            </div>
        `;
        wrapper.querySelector('[name="planContent"]').value = planContent ?? '';
        wrapper.querySelector('[name="planAmount"]').value = planAmount ?? '';
        document.getElementById('planList').appendChild(wrapper);
    }

    function addDetailImageRow() {
        const wrapper = document.createElement('div');
        wrapper.className = 'row-card';
        wrapper.innerHTML = '<input type="file" name="detailImageFiles" accept="image/*">';
        document.getElementById('detailImageList').appendChild(wrapper);
    }

    function addExistingDetailImageRow(image) {
        const wrapper = document.createElement('div');
        wrapper.className = 'row-card';
        wrapper.dataset.imageNo = image.imgNo;
        wrapper.innerHTML = `
            <div class="detail-image-card">
                <img src="${image.imgPath}" alt="detail image">
                <div class="image-name">${image.imgOrgName || image.imgStoredName || image.imgPath || ''}</div>
                <button type="button" class="danger" data-delete-detail-image>삭제</button>
            </div>
        `;
        wrapper.querySelector('[data-delete-detail-image]').addEventListener('click', () => {
            const imageNo = Number(wrapper.dataset.imageNo);
            if (deletedDetailImageNos.has(imageNo)) {
                deletedDetailImageNos.delete(imageNo);
                wrapper.classList.remove('removed');
                wrapper.querySelector('[data-delete-detail-image]').textContent = '삭제';
            } else {
                deletedDetailImageNos.add(imageNo);
                wrapper.classList.add('removed');
                wrapper.querySelector('[data-delete-detail-image]').textContent = '삭제 취소';
            }
        });
        document.getElementById('detailImageList').appendChild(wrapper);
    }

    function toIsoOrNull(value) {
        return value ? new Date(value).toISOString().slice(0, 19) : null;
    }

    function toDatetimeLocal(value) {
        return value ? value.slice(0, 16) : '';
    }

    function setCheckResult(elementId, type, html) {
        const element = document.getElementById(elementId);
        element.className = `check-result ${type}`;
        element.innerHTML = html;
    }

    async function checkBeneficiary() {
        const entryCode = document.getElementById('entryCode').value.trim();
        beneficiaryChecked = false;

        if (!entryCode) {
            setCheckResult('beneficiaryResult', 'error', 'entry code를 입력하세요.');
            return;
        }

        try {
            const response = await fetch(`/api/foundation/campaigns/beneficiary-check?entryCode=${encodeURIComponent(entryCode)}`);
            if (!response.ok) {
                throw new Error(await response.text());
            }

            const data = await response.json();
            if (!data.valid) {
                setCheckResult('beneficiaryResult', 'error', data.message || '수혜자를 찾을 수 없습니다.');
                return;
            }

            beneficiaryChecked = true;
            setCheckResult(
                'beneficiaryResult',
                'success',
                `이름: ${data.name}<br>수혜자 번호: ${data.beneficiaryNo}<br>유형: ${data.beneficiaryType ?? '-'}`
            );
        } catch (error) {
            setCheckResult('beneficiaryResult', 'error', `확인 실패: ${error.message}`);
        }
    }

    async function checkFoundation() {
        const foundationNo = document.getElementById('foundationNo').value.trim();
        foundationChecked = false;
        foundationHasAvailableWallet = false;

        if (!foundationNo) {
            setCheckResult('foundationResult', 'error', 'foundationNo를 입력하세요.');
            return;
        }

        try {
            const response = await fetch(`/api/foundation/campaigns/foundation-check?foundationNo=${encodeURIComponent(foundationNo)}`);
            if (!response.ok) {
                throw new Error(await response.text());
            }

            const data = await response.json();
            foundationChecked = true;
            foundationHasAvailableWallet = Boolean(data.hasAvailableWallet);

            const walletHtml = (data.wallets || []).map(wallet => `
                <div class="wallet-item">
                    <strong>${wallet.walletLabel}</strong>
                    주소: ${wallet.walletAddress ?? '-'}<br>
                    상태: ${wallet.status}<br>
                    사용 가능: ${wallet.available ? '예' : '아니오'}
                </div>
            `).join('');

            setCheckResult(
                'foundationResult',
                data.hasAvailableWallet ? 'success' : 'error',
                `재단명: ${data.foundationName ?? '-'}<br>${data.message}<div class="wallet-list">${walletHtml}</div>`
            );
        } catch (error) {
            setCheckResult('foundationResult', 'error', `확인 실패: ${error.message}`);
        }
    }

    async function submitCampaign() {
        const status = document.getElementById('status');
        status.textContent = '';

        const foundationNo = document.getElementById('foundationNo').value.trim();

        if (!beneficiaryChecked) {
            status.textContent = '수혜자 확인을 먼저 완료하세요.';
            return;
        }

        if (!editMode && !foundationChecked) {
            status.textContent = '재단 지갑 확인을 먼저 완료하세요.';
            return;
        }

        if (!editMode && !foundationHasAvailableWallet) {
            status.textContent = '사용 가능한 캠페인 지갑이 없어 등록할 수 없습니다.';
            return;
        }

        const plans = Array.from(document.querySelectorAll('#planList .row-card')).map(card => ({
            planContent: card.querySelector('[name="planContent"]').value,
            planAmount: Number(card.querySelector('[name="planAmount"]').value)
        })).filter(plan => plan.planContent && plan.planAmount >= 0);

        const dto = {
            title: document.getElementById('title').value,
            description: document.getElementById('description').value,
            category: document.getElementById('category').value,
            entryCode: document.getElementById('entryCode').value.trim(),
            targetAmount: Number(document.getElementById('targetAmount').value),
            startAt: toIsoOrNull(document.getElementById('startAt').value),
            endAt: toIsoOrNull(document.getElementById('endAt').value),
            usageStartAt: toIsoOrNull(document.getElementById('usageStartAt').value),
            usageEndAt: toIsoOrNull(document.getElementById('usageEndAt').value),
            usePlans: plans,
            deletedDetailImageNos: Array.from(deletedDetailImageNos)
        };

        const formData = new FormData();
        formData.append('dto', new Blob([JSON.stringify(dto)], { type: 'application/json' }));

        const imageFile = document.getElementById('imageFile').files[0];
        if (imageFile) {
            formData.append('imageFile', imageFile);
        }

        Array.from(document.querySelectorAll('[name="detailImageFiles"]')).forEach(input => {
            if (input.files[0]) {
                formData.append('detailImageFiles', input.files[0]);
            }
        });

        try {
            const url = editMode
                ? `/api/foundation/campaigns/${encodeURIComponent(editCampaignNo)}`
                : `/api/foundation/campaigns/register?foundationNo=${encodeURIComponent(foundationNo)}`;
            const response = await fetch(url, {
                method: editMode ? 'PUT' : 'POST',
                body: formData
            });

            if (!response.ok) {
                throw new Error(await response.text());
            }

            status.textContent = editMode ? '수정이 완료되었습니다.' : '등록 요청이 완료되었습니다. 사용된 지갑 상태는 ACTIVE로 변경됩니다.';
        } catch (error) {
            status.textContent = `요청 실패: ${error.message}`;
        }
    }

    async function loadEditCampaign() {
        if (!editMode) {
            addPlanRow();
            addDetailImageRow();
            return;
        }

        try {
            const response = await fetch(`/api/foundation/campaigns/${encodeURIComponent(editCampaignNo)}/edit-detail`);
            if (!response.ok) {
                throw new Error(await response.text());
            }

            const data = await response.json();
            document.getElementById('title').value = data.title ?? '';
            document.getElementById('category').value = data.categoryCode ?? '';
            document.getElementById('entryCode').value = data.entryCode ?? '';
            document.getElementById('foundationNo').value = data.foundation?.foundationNo ?? '';
            document.getElementById('description').value = data.description ?? '';
            document.getElementById('targetAmount').value = data.targetAmount ?? '';
            document.getElementById('startAt').value = toDatetimeLocal(data.startAt);
            document.getElementById('endAt').value = toDatetimeLocal(data.endAt);
            document.getElementById('usageStartAt').value = toDatetimeLocal(data.usageStartAt);
            document.getElementById('usageEndAt').value = toDatetimeLocal(data.usageEndAt);

            beneficiaryChecked = true;
            foundationChecked = true;
            foundationHasAvailableWallet = true;

            if (data.entryCode) {
                setCheckResult('beneficiaryResult', 'success', `현재 수혜자 entry code: ${data.entryCode}`);
            }
            if (data.foundation) {
                setCheckResult('foundationResult', 'success', `현재 재단: ${data.foundation.foundationName ?? '-'}<br>기존 배정 지갑을 유지합니다.`);
            }

            document.getElementById('planList').innerHTML = '';
            (data.usePlans && data.usePlans.length ? data.usePlans : [{}]).forEach(plan => {
                addPlanRow(plan.planContent ?? '', plan.planAmount ?? '');
            });
            document.getElementById('detailImageList').innerHTML = '';
            deletedDetailImageNos.clear();
            (data.images || [])
                .filter(image => image.purpose === 'DETAIL')
                .forEach(addExistingDetailImageRow);
            addDetailImageRow();
        } catch (error) {
            document.getElementById('status').textContent = `수정 화면 로딩 실패: ${error.message}`;
        }
    }

    document.getElementById('checkBeneficiaryButton').addEventListener('click', checkBeneficiary);
    document.getElementById('checkFoundationButton').addEventListener('click', checkFoundation);
    document.getElementById('addPlanButton').addEventListener('click', () => addPlanRow());
    document.getElementById('addDetailImageButton').addEventListener('click', addDetailImageRow);
    document.getElementById('submitCampaignButton').addEventListener('click', submitCampaign);

    document.getElementById('entryCode').addEventListener('input', () => {
        beneficiaryChecked = false;
        document.getElementById('beneficiaryResult').className = 'check-result';
        document.getElementById('beneficiaryResult').innerHTML = '';
    });

    document.getElementById('foundationNo').addEventListener('input', () => {
        foundationChecked = false;
        foundationHasAvailableWallet = false;
        document.getElementById('foundationResult').className = 'check-result';
        document.getElementById('foundationResult').innerHTML = '';
    });

    loadEditCampaign();
</script>
</body>
</html>
