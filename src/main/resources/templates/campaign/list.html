<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>캠페인 목록</title>
    <style>
        :root {
            --bg: #f3f6fb;
            --surface: #ffffff;
            --line: #d9e2ec;
            --text: #102a43;
            --muted: #7b8794;
            --accent: #2563eb;
            --accent-soft: #e0ecff;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Malgun Gothic", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 30%),
                linear-gradient(180deg, #f8fafc 0%, #eef4fb 100%);
            color: var(--text);
        }
        .page {
            max-width: 1240px;
            margin: 0 auto;
            padding: 36px 20px 80px;
        }
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .toolbar h1 {
            margin: 0;
            font-size: 32px;
        }
        .toolbar .actions {
            display: flex;
            gap: 10px;
        }
        .toolbar button {
            border: 0;
            border-radius: 999px;
            padding: 10px 16px;
            font: inherit;
            cursor: pointer;
        }
        .toolbar .primary {
            background: var(--accent);
            color: #fff;
        }
        .toolbar .secondary {
            background: var(--accent-soft);
            color: var(--accent);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .card {
            background: var(--surface);
            border: 1px solid rgba(15, 23, 42, 0.08);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 16px 30px rgba(15, 23, 42, 0.08);
        }
        .thumb {
            position: relative;
            height: 220px;
            background: linear-gradient(135deg, #dbeafe, #eff6ff);
        }
        .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .badge-wrap {
            position: absolute;
            top: 14px;
            left: 14px;
            display: flex;
            gap: 8px;
        }
        .badge {
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            color: #fff;
            background: rgba(37, 99, 235, 0.9);
        }
        .badge.subtle {
            background: rgba(255, 255, 255, 0.88);
            color: var(--accent);
        }
        .body {
            padding: 18px 18px 20px;
        }
        .title {
            margin: 0 0 8px;
            font-size: 21px;
            line-height: 1.4;
        }
        .org {
            margin: 0 0 18px;
            color: var(--muted);
            font-size: 14px;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 12px;
        }
        .percent {
            color: var(--accent);
            font-size: 30px;
            font-weight: 800;
            line-height: 1;
        }
        .meta {
            color: var(--muted);
            font-size: 12px;
            margin-top: 4px;
        }
        .amount {
            text-align: right;
            font-weight: 800;
            font-size: 24px;
        }
        .bar {
            width: 100%;
            height: 10px;
            border-radius: 999px;
            background: #eef2f7;
            overflow: hidden;
        }
        .bar > span {
            display: block;
            height: 100%;
            background: linear-gradient(90deg, #2563eb, #38bdf8);
            border-radius: inherit;
        }
        .empty {
            padding: 80px 20px;
            text-align: center;
            color: var(--muted);
            border: 1px dashed var(--line);
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.7);
        }
        @media (max-width: 720px) {
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            .toolbar .actions {
                justify-content: stretch;
            }
            .toolbar .actions button {
                flex: 1;
            }
        }
    </style>
</head>
<body>
<div class="page">
    <div class="toolbar">
        <h1>캠페인 목록</h1>
        <div class="actions">
            <button class="secondary" type="button" onclick="loadCampaigns('deadline')">마감임박순</button>
            <button class="secondary" type="button" onclick="loadCampaigns('participation')">참여순</button>
            <!-- [가빈] 호연언니랑 얘기한 후 캠페인 전체 컨트롤러 경로 수정 → html 경로도 맞춤 -->
            <button class="primary" type="button" onclick="location.href='/api/foundation/campaigns/register'">등록 화면</button>
        </div>
    </div>

    <div id="list" class="grid"></div>
    <div id="empty" class="empty" style="display:none;">표시할 캠페인이 없습니다.</div>
</div>

<script>
    function formatAmount(value) {
        return `${Number(value || 0).toLocaleString()}원`;
    }

    function calculateProgress(currentAmount, targetAmount) {
        if (!targetAmount || targetAmount <= 0) {
            return 0;
        }
        return Math.min(100, Math.floor((currentAmount / targetAmount) * 100));
    }

    function calculateDday(endAt) {
        if (!endAt) {
            return 'D-0';
        }
        const end = new Date(endAt);
        const today = new Date();
        const diff = Math.ceil((end - today) / (1000 * 60 * 60 * 24));
        return `D-${Math.max(diff, 0)}`;
    }

    function renderCampaigns(items) {
        const list = document.getElementById('list');
        const empty = document.getElementById('empty');
        list.innerHTML = '';

        if (!items.length) {
            empty.style.display = 'block';
            return;
        }

        empty.style.display = 'none';

        items.forEach(item => {
            const progressRate = calculateProgress(item.currentAmount, item.targetAmount);
            const card = document.createElement('article');
            card.className = 'card';
            card.innerHTML = `
                <div class="thumb">
                    ${item.imagePath ? `<img src="${item.imagePath}" alt="${item.title}">` : ''}
                    <div class="badge-wrap">
                        <span class="badge">${item.category ?? '카테고리'}</span>
                        <span class="badge subtle">${calculateDday(item.endAt)}</span>
                    </div>
                </div>
                <div class="body">
                    <h2 class="title">${item.title ?? ''}</h2>
                    <p class="org">${item.foundationName ?? '단체명 없음'}</p>
                    <div class="stats">
                        <div>
                            <div class="percent">${progressRate}%</div>
                            <div class="meta">달성률</div>
                        </div>
                        <div>
                            <div class="amount">${formatAmount(item.currentAmount)}</div>
                            <div class="meta">현재 모금액</div>
                        </div>
                    </div>
                    <div class="bar"><span style="width:${progressRate}%"></span></div>
                </div>
            `;
            list.appendChild(card);
        });
    }

    async function loadCampaigns(sort = 'deadline') {
        try {
            // [가빈] 호연언니랑 얘기한 후 캠페인 전체 컨트롤러 경로 수정 → html 경로도 맞춤
            const response = await fetch(`/api/foundation/campaigns?sort=${encodeURIComponent(sort)}`);
            if (!response.ok) {
                throw new Error(await response.text());
            }
            const data = await response.json();
            renderCampaigns(data);
        } catch (error) {
            document.getElementById('list').innerHTML = '';
            const empty = document.getElementById('empty');
            empty.style.display = 'block';
            empty.textContent = `목록을 불러오지 못했습니다: ${error.message}`;
        }
    }

    loadCampaigns();
</script>
</body>
</html>
