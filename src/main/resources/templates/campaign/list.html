<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>罹좏럹??紐⑸줉</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --surface: #ffffff;
            --surface-soft: #eef4ff;
            --line: #d6deea;
            --text: #142033;
            --muted: #6f7d93;
            --accent: #1f5eff;
            --accent-strong: #174bd1;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Malgun Gothic", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(31, 94, 255, 0.10), transparent 28%),
                linear-gradient(180deg, #fbfcfe 0%, #eef3f9 100%);
        }
        .topbar {
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(14px);
            background: rgba(255, 255, 255, 0.88);
            border-bottom: 1px solid rgba(214, 222, 234, 0.8);
        }
        .topbar-inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            font-size: 20px;
        }
        .brand-badge {
            width: 38px;
            height: 38px;
            border-radius: 14px;
            display: grid;
            place-items: center;
            color: #fff;
            background: linear-gradient(135deg, var(--accent), #57a2ff);
            box-shadow: 0 10px 18px rgba(31, 94, 255, 0.24);
        }
        .top-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .top-actions button {
            border: 0;
            border-radius: 999px;
            padding: 10px 16px;
            font: inherit;
            cursor: pointer;
        }
        .ghost {
            background: var(--surface-soft);
            color: var(--accent);
        }
        .primary {
            background: var(--accent);
            color: #fff;
        }
        .page {
            max-width: 1280px;
            margin: 0 auto;
            padding: 34px 20px 80px;
        }
        .hero {
            margin-bottom: 24px;
        }
        .hero h1 {
            margin: 0 0 10px;
            font-size: clamp(30px, 5vw, 44px);
            letter-spacing: -0.03em;
        }
        .hero p {
            margin: 0;
            color: var(--muted);
            font-size: 16px;
            line-height: 1.7;
        }
        .search-panel {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 28px;
            padding: 22px;
            box-shadow: 0 20px 40px rgba(20, 32, 51, 0.08);
            margin-bottom: 24px;
        }
        .search-grid {
            display: grid;
            grid-template-columns: 1fr 1.1fr 1fr auto;
            gap: 12px;
            align-items: end;
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .field label {
            font-size: 13px;
            font-weight: 700;
            color: var(--muted);
        }
        .field input,
        .field select {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 14px 16px;
            font: inherit;
            background: #fff;
        }
        .search-buttons {
            display: flex;
            gap: 10px;
        }
        .search-buttons button {
            border: 0;
            border-radius: 16px;
            padding: 14px 18px;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }
        .sort-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .sort-row button {
            border: 1px solid var(--line);
            background: var(--surface);
            color: var(--muted);
            border-radius: 999px;
            padding: 10px 16px;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }
        .sort-row button.active {
            border-color: transparent;
            background: linear-gradient(135deg, var(--accent), #4f97ff);
            color: #fff;
        }
        .result-summary {
            margin-bottom: 18px;
            color: var(--muted);
            font-size: 14px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
            gap: 20px;
        }
        .card {
            background: var(--surface);
            border: 1px solid rgba(20, 32, 51, 0.08);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 16px 30px rgba(20, 32, 51, 0.08);
            cursor: pointer;
        }
        .thumb {
            position: relative;
            height: 220px;
            background: linear-gradient(135deg, #dbeafe, #eef5ff);
        }
        .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .thumb-empty {
            width: 100%;
            height: 100%;
            display: grid;
            place-items: center;
            color: var(--muted);
            font-weight: 700;
        }
        .badge-wrap {
            position: absolute;
            top: 14px;
            left: 14px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .badge {
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            color: #fff;
            background: rgba(31, 94, 255, 0.92);
        }
        .badge.subtle {
            background: rgba(255, 255, 255, 0.92);
            color: var(--accent-strong);
        }
        .card-body {
            padding: 18px 18px 20px;
        }
        .title {
            margin: 0 0 8px;
            font-size: 22px;
            line-height: 1.4;
        }
        .org {
            margin: 0 0 18px;
            color: var(--muted);
            font-size: 14px;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: flex-end;
            margin-bottom: 12px;
        }
        .percent {
            color: var(--accent);
            font-size: 30px;
            font-weight: 800;
            line-height: 1;
        }
        .meta {
            color: var(--muted);
            font-size: 12px;
            margin-top: 4px;
        }
        .amount {
            text-align: right;
            font-weight: 800;
            font-size: 24px;
        }
        .bar {
            width: 100%;
            height: 10px;
            border-radius: 999px;
            background: #e8eef7;
            overflow: hidden;
        }
        .bar > span {
            display: block;
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #45b0ff);
            border-radius: inherit;
        }
        .empty {
            padding: 84px 20px;
            text-align: center;
            color: var(--muted);
            border: 1px dashed var(--line);
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.76);
        }
        @media (max-width: 920px) {
            .search-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
        @media (max-width: 720px) {
            .topbar-inner,
            .toolbar,
            .search-grid,
            .search-buttons,
            .top-actions {
                flex-direction: column;
                align-items: stretch;
            }
            .search-grid {
                grid-template-columns: 1fr;
            }
            .search-buttons button,
            .top-actions button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<header class="topbar">
    <div class="topbar-inner">
        <div class="brand">
            <div class="brand-badge">C</div>
            <span>캠페인</span>
        </div>
        <div class="top-actions">
            <button class="ghost" type="button" onclick="location.href='/api/foundation/campaigns/list'">罹좏럹??紐⑸줉 議고쉶</button>
            <button class="primary" type="button" onclick="location.href='/api/foundation/campaigns/register'">罹좏럹???깅줉</button>
        </div>
    </div>
</header>

<main class="page">
    <section class="hero">
        <h1>罹좏럹??紐⑸줉</h1>
        <p>罹좏럹???쒕ぉ, 湲곕??⑥껜 ?대쫫, 移댄뀒怨좊━ 湲곗??쇰줈 ?먰븯??罹좏럹?몄쓣 李얠쓣 ???덉뒿?덈떎.</p>
    </section>

    <section class="search-panel">
        <div class="search-grid">
            <div class="field">
                <label for="searchType">寃??議곌굔</label>
                <select id="searchType">
                    <option value="title">罹좏럹???쒕ぉ</option>
                    <option value="foundation">湲곕??⑥껜 ?대쫫</option>
                </select>
            </div>
            <div class="field">
                <label for="keyword">寃?됱뼱</label>
                <input id="keyword" type="text" placeholder="검색어를 입력하세요">
            </div>
            <div class="field">
                <label for="category">移댄뀒怨좊━</label>
                <select id="category">
                    <option value="">?꾩껜</option>
                    <option value="CHILD_YOUTH">아동/청소년</option>
                    <option value="SENIOR">어르신</option>
                    <option value="DISABLED">장애인</option>
                    <option value="ANIMAL">?숇Ъ</option>
                    <option value="ENVIRONMENT">?섍꼍</option>
                    <option value="ETC">湲고?</option>
                </select>
            </div>
            <div class="search-buttons">
                <button class="primary" type="button" id="searchButton">검색</button>
                <button class="ghost" type="button" id="resetButton">초기화</button>
            </div>
        </div>
    </section>

    <div class="sort-row">
        <button type="button" data-sort="deadline" class="active">마감 임박순</button>
        <button type="button" data-sort="participation">참여율순</button>
    </div>

    <div id="resultSummary" class="result-summary">紐⑸줉??遺덈윭?ㅻ뒗 以묒엯?덈떎.</div>
    <div id="list" class="grid"></div>
    <div id="empty" class="empty" style="display:none;">?쒖떆??罹좏럹?몄씠 ?놁뒿?덈떎.</div>
</main>


<script>
    let currentSort = "deadline";
    let currentPage = 1;
    let hasNextPage = false;
    let isLoadingMore = false;
    const PAGE_SIZE = 6;

    function formatAmount(value) {
        return Number(value || 0).toLocaleString() + "원";
    }

    function calculateProgress(currentAmount, targetAmount) {
        if (!targetAmount || targetAmount <= 0) {
            return 0;
        }

        return Math.min(100, Math.floor(((currentAmount || 0) / targetAmount) * 100));
    }

    function calculateDday(endAt) {
        if (!endAt) {
            return "D-0";
        }

        const end = new Date(endAt);
        const today = new Date();
        const diff = Math.ceil((end - today) / (1000 * 60 * 60 * 24));
        return "D-" + Math.max(diff, 0);
    }

    function updateSortButtons() {
        document.querySelectorAll("[data-sort]").forEach(button => {
            button.classList.toggle("active", button.dataset.sort === currentSort);
        });
    }

    function ensureLoadMoreButton() {
        let loadMoreButton = document.getElementById("loadMoreButton");
        if (loadMoreButton) {
            return loadMoreButton;
        }

        const wrapper = document.createElement("div");
        wrapper.style.display = "flex";
        wrapper.style.justifyContent = "center";
        wrapper.style.marginTop = "20px";

        loadMoreButton = document.createElement("button");
        loadMoreButton.id = "loadMoreButton";
        loadMoreButton.type = "button";
        loadMoreButton.className = "ghost";
        loadMoreButton.textContent = "더보기";
        loadMoreButton.style.display = "none";
        loadMoreButton.addEventListener("click", () => {
            if (!isLoadingMore && hasNextPage) {
                loadCampaigns({ append: true });
            }
        });

        wrapper.appendChild(loadMoreButton);
        document.querySelector("main.page").appendChild(wrapper);
        return loadMoreButton;
    }

    function updateLoadMoreButton() {
        const loadMoreButton = ensureLoadMoreButton();
        loadMoreButton.style.display = hasNextPage ? "inline-flex" : "none";
        loadMoreButton.disabled = isLoadingMore;
    }

    function resetListState() {
        currentPage = 1;
        hasNextPage = false;
        isLoadingMore = false;
        document.getElementById("list").innerHTML = "";
        updateLoadMoreButton();
    }

    function buildQuery(page = 1) {
        const params = new URLSearchParams();
        params.set("page", String(page));
        params.set("size", String(PAGE_SIZE));
        params.set("sort", currentSort);
        params.set("includeClosed", "false");

        const searchType = document.getElementById("searchType").value;
        const keyword = document.getElementById("keyword").value.trim();
        const category = document.getElementById("category").value;

        if (searchType) {
            params.set("searchType", searchType);
        }
        if (keyword) {
            params.set("keyword", keyword);
        }
        if (category) {
            params.set("category", category);
        }

        return params.toString();
    }

    function appendCampaigns(items, append = false) {
        const list = document.getElementById("list");
        if (!append) {
            list.innerHTML = "";
        }

        items.forEach(item => {
            const progressRate = calculateProgress(item.currentAmount, item.targetAmount);
            const card = document.createElement("article");
            card.className = "card";
            card.onclick = () => {
                location.href = "/api/foundation/campaigns/" + item.campaignNo;
            };
            card.innerHTML =
                "<div class=\"thumb\">" +
                (item.imagePath
                    ? "<img src=\"" + item.imagePath + "\" alt=\"" + (item.title || "") + "\">"
                    : "<div class=\"thumb-empty\">대표 이미지 없음</div>") +
                "<div class=\"badge-wrap\">" +
                "<span class=\"badge\">" + (item.category || "카테고리") + "</span>" +
                "<span class=\"badge subtle\">" + calculateDday(item.endAt) + "</span>" +
                "</div></div>" +
                "<div class=\"card-body\">" +
                "<h2 class=\"title\">" + (item.title || "") + "</h2>" +
                "<p class=\"org\">" + (item.foundationName || "기부단체 정보 없음") + "</p>" +
                "<div class=\"stats\"><div><div class=\"percent\">" + progressRate + "%</div><div class=\"meta\">달성률</div></div>" +
                "<div><div class=\"amount\">" + formatAmount(item.currentAmount) + "</div><div class=\"meta\">현재 모금액</div></div></div>" +
                "<div class=\"bar\"><span style=\"width:" + progressRate + "%\"></span></div>" +
                "</div>";
            list.appendChild(card);
        });
    }

    function updateSummary(pageInfo) {
        const summary = document.getElementById("resultSummary");
        const totalElements = Number(pageInfo?.totalElements ?? 0);
        summary.textContent = "총 " + totalElements.toLocaleString() + "개의 캠페인을 찾았습니다.";
    }

    async function loadCampaigns({ append = false } = {}) {
        const list = document.getElementById("list");
        const empty = document.getElementById("empty");
        const summary = document.getElementById("resultSummary");
        const requestPage = append ? currentPage + 1 : 1;

        try {
            updateSortButtons();
            if (!append) {
                resetListState();
                empty.style.display = "none";
                empty.textContent = "표시할 캠페인이 없습니다.";
                summary.textContent = "목록을 불러오는 중입니다.";
            } else {
                isLoadingMore = true;
                updateLoadMoreButton();
            }

            const response = await fetch("/api/foundation/campaigns?" + buildQuery(requestPage));
            if (!response.ok) {
                throw new Error(await response.text());
            }

            const data = await response.json();
            const items = Array.isArray(data?.content) ? data.content : (Array.isArray(data) ? data : []);
            const pageInfo = data?.pageInfo || null;

            if (!append && items.length === 0) {
                list.innerHTML = "";
                empty.style.display = "block";
                summary.textContent = "검색 조건에 맞는 캠페인이 없습니다.";
                hasNextPage = false;
                updateLoadMoreButton();
                return;
            }

            appendCampaigns(items, append);
            currentPage = Number(pageInfo?.page || requestPage);
            hasNextPage = Boolean(pageInfo?.hasNext);
            updateSummary(pageInfo);
            empty.style.display = "none";
            updateLoadMoreButton();
        } catch (error) {
            if (!append) {
                list.innerHTML = "";
                empty.style.display = "block";
                summary.textContent = "목록 조회 중 오류가 발생했습니다.";
                empty.textContent = "목록을 불러오지 못했습니다. " + error.message;
            }
            hasNextPage = false;
            updateLoadMoreButton();
        } finally {
            isLoadingMore = false;
            updateLoadMoreButton();
        }
    }

    document.querySelectorAll("[data-sort]").forEach(button => {
        button.addEventListener("click", () => {
            currentSort = button.dataset.sort;
            loadCampaigns({ append: false });
        });
    });

    document.getElementById("searchButton").addEventListener("click", () => loadCampaigns({ append: false }));
    document.getElementById("resetButton").addEventListener("click", () => {
        document.getElementById("searchType").value = "title";
        document.getElementById("keyword").value = "";
        document.getElementById("category").value = "";
        currentSort = "deadline";
        loadCampaigns({ append: false });
    });

    document.getElementById("keyword").addEventListener("keydown", event => {
        if (event.key === "Enter") {
            loadCampaigns({ append: false });
        }
    });

    ensureLoadMoreButton();
    loadCampaigns({ append: false });
</script>
</body>
</html>
