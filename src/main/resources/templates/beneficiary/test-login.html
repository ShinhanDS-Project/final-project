<!DOCTYPE html>
<html>
<head><title>JWT Login Test</title></head>
<body>
<h2>수혜자 로그인 테스트</h2>
<input type="text" id="email" placeholder="이메일"><br>
<input type="password" id="password" placeholder="비밀번호"><br>
<button onclick="login()">로그인</button>

<script>
    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        const response = await fetch('/api/beneficiary/signin', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });

        if (response.ok) {
            // 서버에서 직접 쿠키(HttpOnly)를 발급했으므로 클라이언트는 저장할 필요가 없습니다.
            alert('로그인 성공! 리스트 페이지로 이동합니다.');

            // 리스트 페이지로 강제 이동 (쿠키는 브라우저가 자동으로 들고 갑니다)
            window.location.href = '/finalReport/list';
        } else {
            alert('로그인 실패: 이메일 또는 비밀번호를 확인하십시오.');
        }
    }

</script>
</body>
</html>
