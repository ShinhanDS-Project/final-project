<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>계정 비활성화 안내</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333;">
<div style="max-width: 600px; margin: 0 auto; padding: 24px; border: 1px solid #ddd; border-radius: 8px;">
    <h2 style="color: #c0392b;">계정 비활성화 안내</h2>

    <p>
        안녕하세요,
        <strong th:text="${foundationName}">단체명</strong> 담당자님.
    </p>

    <p>
        아래 캠페인의 활동 보고서가 사업 집행 종료일 기준 <strong>14일 이상 미제출</strong>되어
        귀 단체 계정이 <strong style="color: #c0392b;">비활성화</strong>되었습니다.
    </p>

    <div style="background: #fdf2f2; border-left: 4px solid #c0392b; padding: 16px; border-radius: 4px; margin: 16px 0;">
        <p style="margin: 0; font-weight: bold; color: #c0392b;">미제출 캠페인</p>
        <p style="margin: 8px 0 0;" th:text="${campaignTitle}">캠페인 제목</p>
    </div>

    <p>
        계정 복구 및 활동 보고서 제출에 대한 문의는 플랫폼 고객센터로 연락해 주세요.
    </p>

    <hr style="margin: 24px 0;">

    <p style="font-size: 12px; color: #888;">
        본 메일은 발신 전용입니다.
    </p>
</div>
</body>
</html>
