<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>기부단체 승인 안내</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333;">
<div style="max-width: 600px; margin: 0 auto; padding: 24px; border: 1px solid #ddd; border-radius: 8px;">
    <h2 style="color: #2c3e50;">기부단체 가입 승인 안내</h2>

    <p>
        안녕하세요,
        <strong th:text="${foundationName}">단체명</strong> 담당자님.
    </p>

    <p>
        귀 단체의 가입 신청이 정상적으로 <strong>승인</strong>되었습니다.
    </p>

    <p>
        아래의 임시 비밀번호로 로그인 후 <b style="color: #c0392b">반드시 비밀번호를 변경해 주세요.</b>
    </p>

    <div style="background: #f4f6f9; padding: 16px; border-radius: 6px; margin: 16px 0; text-align: center;">
        <span style="font-size: 20px; font-weight: bold; letter-spacing: 2px; color: #2d6cdf;"
              th:text="${tempPassword}">임시비밀번호</span>
    </div>

    <hr style="margin: 24px 0;">

    <p style="font-size: 12px; color: #888;">
        본 메일은 발신 전용입니다. 임시 비밀번호는 외부에 공유하지 마세요.
    </p>
</div>
</body>
</html>
