<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>기부단체 가입 반려 안내</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333;">
<div style="max-width: 600px; margin: 0 auto; padding: 24px; border: 1px solid #ddd; border-radius: 8px;">
    <h2 style="color: #c0392b;">기부단체 가입 반려 안내</h2>

    <p>
        안녕하세요,
        <strong th:text="${foundationName}">단체명</strong> 담당자님.
    </p>

    <p>
        귀 단체의 가입 신청이 아래의 사유로 <strong>반려</strong>되었습니다.
    </p>

    <div style="background: #fdf2f2; border-left: 4px solid #c0392b; padding: 16px; border-radius: 4px; margin: 16px 0;">
        <p style="margin: 0; font-weight: bold; color: #c0392b;">반려 사유</p>
        <p style="margin: 8px 0 0; white-space: pre-line;" th:text="${rejectReason}">반려 사유 내용</p>
    </div>

    <p>
        반려 사유를 확인하신 후 수정하여 다시 신청해 주시기 바랍니다.
        문의사항이 있으시면 플랫폼 고객센터로 연락해 주세요.
    </p>

    <hr style="margin: 24px 0;">

    <p style="font-size: 12px; color: #888;">
        본 메일은 발신 전용입니다.
    </p>
</div>
</body>
</html>
