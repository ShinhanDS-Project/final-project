spring.application.name=final_project
server.port=8090

spring.config.import=optional:file:.env[.properties]

spring.datasource.driver-class-name=${DB_DRIVER}
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

#jwt
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=6
jwt.header=Authorization
jwt.token-prefix=Bearer

file.upload-path=C:/uploads/

# S3
cloud.aws.s3.bucket=${S3_BUCKET_NAME}
cloud.aws.region.static=${S3_REGION}
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY}
cloud.aws.credentials.secret-key=${AWS_SECRET_KEY}






#포스트맨 경로 요청 오류 찾으려고 디버그 단위로 로그 확인함
#logging.level.org.springframework.security=DEBUG

#구글 Auth 관련
spring.security.oauth2.client.registration.google.client-id=${CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile


#smtp (???)
#구글 콘솔의 승인된 리다이렉션 URI와 반드시 일치해야 함!
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI}

#메일 설정 관련
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.debug=true

#프론트 주소
app.frontend-url=http://localhost:3000/


#jwt ?? -> ??? redirect? ? ?? (false->????, true->??)
cookie.secure=false

#파일 관련
blockchain.stub.enabled=${BLOCKCHAIN_STUB_ENABLED:true}
blockchain.rpc.url=${BLOCKCHAIN_RPC_URL:${RPC_URL}}
blockchain.chain-id=${BLOCKCHAIN_CHAIN_ID:}
blockchain.gas.price=30000000000
blockchain.gas.initial-pol-wei=${BLOCKCHAIN_INITIAL_POL_WEI:15000000000000000}
blockchain.token.decimals=${BLOCKCHAIN_TOKEN_DECIMALS:18}
blockchain.contract.address=${BLOCKCHAIN_CONTRACT_ADDRESS:}
blockchain.contract.donation-token-address=${BLOCKCHAIN_CONTRACT_DONATION_TOKEN_ADDRESS:${BLOCKCHAIN_CONTRACT_ADDRESS:}}
blockchain.wallet.hot-address=${BLOCKCHAIN_HOT_WALLET_ADDRESS:}
blockchain.tx.gas-limit=${BLOCKCHAIN_TX_GAS_LIMIT:120000}
blockchain.gas.topup-buffer-bps=${BLOCKCHAIN_GAS_TOPUP_BUFFER_BPS:12500}
blockchain.tx.receipt-interval-ms=${BLOCKCHAIN_TX_RECEIPT_INTERVAL_MS:1500}
blockchain.tx.receipt-attempts=${BLOCKCHAIN_TX_RECEIPT_ATTEMPTS:50}

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB

# CORS — 프론트엔드 origin (환경변수 CORS_ALLOWED_ORIGIN 없으면 런타임에럽 방지용 localhost:3000 기본값)
cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:3000}

